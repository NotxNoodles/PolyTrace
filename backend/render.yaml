# Render Blueprint — deploy backend as a Web Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: polytrace-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["https://polytrace.vercel.app"]'
      - key: LOG_LEVEL
        value: INFO
      - key: POLYGON_RPC_URL
        sync: false
